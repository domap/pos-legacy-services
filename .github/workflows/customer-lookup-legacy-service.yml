name: customer-lookup-legacy-service

on:
  push:
    paths:
      - "customer-lookup-legacy-service/**"
      - ".github/workflows/customer-lookup-legacy-service.yml"
  pull_request:
    paths:
      - "customer-lookup-legacy-service/**"
      - ".github/workflows/customer-lookup-legacy-service.yml"

concurrency:
  group: customer-lookup-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: customer-lookup-legacy-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
          cache-dependency-path: customer-lookup-legacy-service/pom.xml

      - name: Maven verify
        run: chmod +x mvnw && ./mvnw -B verify

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: customer-lookup-legacy-service
          severity: CRITICAL,HIGH
          exit-code: "0"

  image:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.AWS_ROLE_ARN != '' && vars.AWS_ECR_REPOSITORY != ''
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.AWS_ECR_REPOSITORY }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build -f customer-lookup-legacy-service/Dockerfile \
            -t "${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" \
            customer-lookup-legacy-service
          docker push "${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker tag "${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" "${REGISTRY}/${ECR_REPOSITORY}:latest"
          docker push "${REGISTRY}/${ECR_REPOSITORY}:latest"
