# Legacy: fixed port and file-backed H2 (not ephemeral / not true backing service abstraction)
server.port=8081
spring.application.name=customer-lookup-legacy

spring.datasource.url=jdbc:h2:file:./data/customer-legacy-db;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Anti-pattern: debug left on in committed config
logging.level.org.springframework.web=DEBUG
