spring:
  datasource:
    url: jdbc:h2:mem:customer-lookup-test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
  h2:
    console:
      enabled: false

logging:
  level:
    org.springframework.web: WARN
